version: '3'
env:
  DOPPLER_TOKEN: ${DOPPLER_TOKEN}
  PATH_TO_DB_ROOT_CERT: ${PATH_TO_DB_ROOT_CERT}
  LETSENCRYPT_EMAIL: Terry.Arthur@BrooksJr.com
  # CODACY_PROJECT_TOKEN must be set in the environment (do not hardcode)
  CODACY_PROJECT_TOKEN: ${CODACY_PROJECT_TOKEN}
  CODACY_USERNAME: Terry-BrooksJr
  CODACY_PROJECT_NAME: the-dozens-django
  PYTHONPATH: "{{ .TASKFILE_DIR }}:{{ .TASKFILE_DIR }}/applications/API:{{ .TASKFILE_DIR }}/applications/graphQL:{{ .TASKFILE_DIR }}/applications/frontend:{{ .TASKFILE_DIR }}/common:{{ .TASKFILE_DIR }}/run"
  TEMP_STATIC_DIR: ${TEMP_STATIC_DIR}
silent: true
tasks:
  default:
    cmds:
      - task -l

  venv:
    desc: Make a new virtual environment
    cmds:
      - python3 -m venv .venv --prompt="ACTIVE_VENV_DJANGO_DOZENS"
    # NOTE: `source .venv/bin/activate` is intentionally omitted — each Task
    # command runs in its own subshell so sourcing the venv has no effect on
    # subsequent commands. Use `.venv/bin/<tool>` paths instead.
    internal: true

  run:dev:
    desc: Starts the Django Application and background workers in a debug state
    dir: .
    cmds:
      - echo "Completing Pre-Start Environment Check For Development..."
      - echo "Django Configuration:${DJANGO_CONFIGURATION}"
      - PYTHONPATH="${PYTHONPATH}" .venv/bin/python3 -m gunicorn -w 1 --timeout 120 --worker-class=sync core.wsgi:application --bind 127.0.0.1:{{or .CLI_ARGS 8000}} --reload
    # NOTE: `source .envrc` removed — no-op in a non-interactive subshell.
    # NOTE: `-t 1` (connect timeout) removed — it conflicted with --timeout 120.
    interactive: false
    silent: false

  install:
    desc: Install project dependencies into the virtual environment
    deps: [ venv ]
    cmds:
      - .venv/bin/pip install --quiet --upgrade pip
      - .venv/bin/pip install poetry
      - .venv/bin/poetry lock
      - .venv/bin/poetry install --no-root
    silent: false

  freeze:
    desc: Pin current dependencies and export requirements files
    cmds:
      - .venv/bin/poetry sync
      - .venv/bin/poetry export --without dev,test --without-hashes --without-urls > ./requirements/base.txt
      - .venv/bin/poetry export  --without-hashes --without-urls > ./requirements/dev.txt
    generates:
      - ./requirements/dev.txt
      - ./requirements/base.txt
      - ./poetry.lock
    sources:
      - ./poetry.lock
      - ./requirements/dev.txt
      - ./requirements/base.txt
    silent: false

  db_sync:
    desc: Make and run migrations
    dir: .
    cmds:
      - PYTHONPATH="${PYTHONPATH}" .venv/bin/python3 run/manage.py makemigrations
      - PYTHONPATH="${PYTHONPATH}" .venv/bin/python3 run/manage.py migrate
    # NOTE: sources/generates removed for migrations — Task's file-fingerprinting
    # is unreliable for Django migration files (auto-generated names change each
    # run). Migrations are always re-run to guarantee idempotency.
    requires:
      vars:
        - DOPPLER_TOKEN
        - PATH_TO_DB_ROOT_CERT

  collect:
    dir: .
    desc: Collect static files into single directory for production
    cmds:
      - PYTHONPATH="${PYTHONPATH}" .venv/bin/python3 run/manage.py collectstatic --no-input
    # NOTE: `source .envrc` removed (no-op in subshell). PYTHONPATH now uses the
    # globally defined env var instead of a long inline literal.

  run:test:
    dir: .
    desc: Run tests with coverage and generate cobertura.xml
    env:
      DJANGO_CONFIGURATION: Testing
    cmds:
      - rm -f .coverage .coverage.*
      - PYTHONPATH="${PYTHONPATH}" .venv/bin/python -m coverage run --source=applications --omit='*/tests/*,*/migrations/*' run/manage.py test applications.API applications.graphQL applications.frontend --verbosity 2
      - .venv/bin/python -m coverage report -m
      - .venv/bin/python -m coverage xml -o cobertura.xml
    generates:
      - ".coverage"
      - "cobertura.xml"
    requires:
      vars:
        - DOPPLER_TOKEN
        - PATH_TO_DB_ROOT_CERT

  run:prod:
    dir: .
    silent: false
    desc: Start Production Level Services — install requirements, apply migrations, then start production server
    cmds:
      - echo 'Starting Production Level Services...'
      - echo 'Installing dependencies'
      - task: install

      - echo 'Applying migrations...'
      - task: db_sync

      - echo 'Starting server...'
      - DJANGO_CONFIGURATION=Production .venv/bin/python3 -m gunicorn --workers=2 --threads=2 core.wsgi:application --bind 0.0.0.0:{{or .CLI_ARGS 8080}}

  schema-check:
    dir: "{{.TASKFILE_DIR}}"
    desc: Check Models and Serializers for schema compliance with OpenAPI 3.0 Standards and fail on warnings
    cmds:
      - PYTHONPATH="${PYTHONPATH}" .venv/bin/python3 run/manage.py spectacular --file schema/schema$(date +"%Y-%m-%d").yaml --validate
    internal: true

  schema:
    deps: [ schema-check ]
    dir: "{{.TASKFILE_DIR}}"
    desc: Generate OpenAPI 3.0 schema.yaml file from models and serializers
    cmds:
      - PYTHONPATH="${PYTHONPATH}" .venv/bin/python3 run/manage.py spectacular --file schema/schema$(date +"%Y-%m-%d_%H:%M:%S").yaml

  build-image:
    desc: Build Docker Image
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - docker buildx build --platform linux/amd64,linux/arm64 --push -f .deploy/Dockerfile -t terrybrooks/thedozens:latest .
    requires:
      vars:
        - DOPPLER_TOKEN
        - PATH_TO_DB_ROOT_CERT

  build-frontend-image:
    desc: Build Nginx frontend Docker image
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - docker build -f .deploy/Dockerfile.nginx -t terrybrooks/thedozens-frontend:latest .

  compose:up:
    desc: Start all services (API + Nginx frontend) with Docker Compose
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - docker compose up --build {{.CLI_ARGS}}
    requires:
      vars:
        - DOPPLER_TOKEN

  compose:down:
    desc: Stop and remove all Docker Compose services
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - docker compose down {{.CLI_ARGS}}

  lint:lint:
    desc: Run all linting and formatting tools
    dir: .
    cmds:
      - echo "🔍 Running Python linting and formatting..."
      - echo "🧹 Running autoflake (unused imports/variables check)..."
      - .venv/bin/autoflake --check --recursive --remove-all-unused-imports --remove-unused-variables --remove-duplicate-keys --ignore-init-module-imports .
      - echo "📋 Running isort (import sorting)..."
      - .venv/bin/isort . --check-only --diff
      - echo "⚫ Running black (code formatting)..."
      - .venv/bin/black . --check --diff
      - echo "🚀 Running ruff (fast linting)..."
      - .venv/bin/ruff check .
      - echo "🔧 Running pylint (comprehensive linting)..."
      # NOTE: `**/*.py` glob is replaced with `find` — shell globstar is not
      # guaranteed in Task's subshell and silently passes no files to pylint.
      - .venv/bin/pylint $(find . -name '*.py' -not -path './.venv/*' -not -path './migrations/*') --load-plugins=pylint_django,pylint_celery --django-settings-module=core.settings
      - echo "🔒 Running bandit (security linting)..."
      # NOTE: exclude updated from `./venv` → `./.venv` to match actual venv path.
      - .venv/bin/bandit -r . -f json --exclude=./tests,./.venv
      - echo "🎯 Running mypy (type checking)..."
      - .venv/bin/mypy .
      - echo "🌟 Running djlint (Django template linting)..."
      - .venv/bin/djlint --check templates/**/*.html
      - echo "✅ All linting checks completed!"
    silent: false
    interactive: false

  lint:fix:
    desc: Automatically fix linting and formatting issues
    dir: .
    cmds:
      - echo "🔧 Auto-fixing Python linting and formatting issues..."
      - echo "🧹 Running autoflake (removing unused imports/variables)..."
      - cmd: .venv/bin/autoflake --in-place --recursive --remove-all-unused-imports --remove-unused-variables --remove-duplicate-keys --ignore-init-module-imports .
        ignore_error: true
      - echo "📋 Running isort (import sorting)..."
      - cmd: .venv/bin/isort .
        ignore_error: true
      - echo "⚫ Running black (code formatting)..."
      - cmd: .venv/bin/black .
        ignore_error: true
      - echo "🚀 Running ruff (auto-fix)..."
      - cmd: .venv/bin/ruff check . --fix
        ignore_error: true
      - echo "🌟 Running djlint (Django template auto-fix)..."
      - cmd: .venv/bin/djlint --reformat templates/**/*.html
        ignore_error: true
      - echo "✅ Auto-fix completed! Run 'task lint:lint' to check remaining issues."
    silent: false
    interactive: false

  django:
    desc: "Wrapper command to simplify the use of Django management commands. Example Usage: task django -- runserver"
    dir: "{{.TASKFILE_DIR}}"
    env:
      PYTHONPATH: "{{.PYTHONPATH}}"
    cmds:
      - PYTHONPATH="${PYTHONPATH}" .venv/bin/python3 run/manage.py {{.CLI_ARGS}}
    silent: false
    interactive: true

  test:coverage:
    desc: Run Django tests with coverage and generate reports
    env:
      DJANGO_CONFIGURATION: Testing
    cmds:
      - rm -f .coverage .coverage.*
      - PYTHONPATH="${PYTHONPATH}" .venv/bin/python -m coverage run --source=applications --omit='*/tests/*,*/migrations/*' run/manage.py test applications.API applications.graphQL applications.frontend --verbosity 2
      - .venv/bin/python -m coverage debug data
      - .venv/bin/python -m coverage report -m
      - .venv/bin/python -m coverage xml -o cobertura.xml
    silent: false
    sources:
      - "**/*.py"
    generates:
      - ".coverage"
      - "cobertura.xml"
  test:coverage1:
    desc: Backward-compatible alias for coverage test command
    deps: [ test:coverage ]

  coverage:upload:
    desc: Upload coverage report to Codacy (requires CODACY_PROJECT_TOKEN env var)
    deps: [ test:coverage ]
    cmds:
      - bash <(curl -Ls https://coverage.codacy.com/get.sh) report -r cobertura.xml
    requires:
      vars:
        - CODACY_PROJECT_TOKEN
