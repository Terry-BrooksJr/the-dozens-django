version: '3.8'

# Production stack for The Dozens API.
#
# Start with:
#   doppler run -- docker compose -f .deploy/docker-compose.yml up -d
#
# Doppler injects all secrets as environment variables at runtime so no
# .env file is needed and no credentials appear in this file.
#
# Services
# ──────────────────────────────────────────────────────────────────────
#  api               Django / Gunicorn application        :9090
#  db                PostgreSQL 16                        :5432 (internal)
#  dragonfly         Dragonfly DB (Redis-compatible)      :6379 (internal)
#  postgres-exporter Prometheus exporter for PostgreSQL   :9187 (internal)
#  dragonfly-exporter Prometheus exporter for Dragonfly  :9121 (internal)
#  prometheus        Prometheus scraper                   :9090 → host :9091
# ──────────────────────────────────────────────────────────────────────

services:

  # ── Django API ────────────────────────────────────────────────────────
  api:
    image: terrybrooks/django-dozens:latest
    container_name: api_dozens
    restart: unless-stopped
    networks:
      - dozens-ecosystem
    ports:
      - "9090:9090"
    environment:
      - DJANGO_CONFIGURATION=Production
      - DJANGO_SETTINGS_MODULE=core.settings
      # All other secrets (DB creds, Redis URL, etc.) injected by Doppler
      - POSTGRES_DB
      - PG_DATABASE_USER
      - PG_DATABASE_PASSWORD
      - PG_DATABASE_HOST=db
      - PG_DATABASE_PORT=5432
      - REDIS_CACHE_TOKEN=redis://dragonfly:6379
      - ALLOWED_HOSTS
      - ALLOWED_ORIGINS
      - PROMETHEUS_ALLOWED_HOSTS=165.227.105.209
    depends_on:
      db:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── PostgreSQL ────────────────────────────────────────────────────────
  db:
    image: postgres:16
    container_name: database_dozens
    restart: unless-stopped
    networks:
      - dozens-ecosystem
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB
      - POSTGRES_USER=${PG_DATABASE_USER}
      - POSTGRES_PASSWORD=${PG_DATABASE_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_DATABASE_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Dragonfly DB ──────────────────────────────────────────────────────
  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    container_name: cache_database_dozens
    restart: unless-stopped
    networks:
      - dozens-ecosystem
    volumes:
      - dragonfly_data:/data
    ulimits:
      memlock: -1
    command: ["--logtostderr", "--requirepass=${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "PING"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ── PostgreSQL Exporter ───────────────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres_exporter_dozens
    restart: unless-stopped
    networks:
      - dozens-ecosystem
    environment:
      - DATA_SOURCE_NAME=postgresql://${PG_DATABASE_USER}:${PG_DATABASE_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

  # ── Dragonfly / Redis Exporter ────────────────────────────────────────
  dragonfly-exporter:
    image: oliver006/redis_exporter:latest
    container_name: dragonfly_exporter_dozens
    restart: unless-stopped
    networks:
      - dozens-ecosystem
    environment:
      - REDIS_ADDR=redis://dragonfly:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      dragonfly:
        condition: service_healthy

  # ── Prometheus ────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_dozens
    restart: unless-stopped
    networks:
      - dozens-ecosystem
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    depends_on:
      - api
      - postgres-exporter
      - dragonfly-exporter

volumes:
  postgres_data:
  dragonfly_data:
  prometheus_data:

networks:
  dozens-ecosystem:
    driver: bridge
