# prometheus.yml — The Dozens API
#
# Prometheus runs natively on the host (165.227.105.209).
# All targets are reached via localhost ports that Docker publishes from
# each container — no container-internal DNS names are used here.
#
# Port map (host-side, localhost-only bindings):
#   9090  → api container          (Django /metrics, direct — bypasses Traefik)
#   8082  → traefik container      (Traefik built-in Prometheus metrics entrypoint)
#   9187  → postgres-exporter      (polls native PostgreSQL on host.docker.internal)
#   9121  → dragonfly-exporter     (polls native Dragonfly on host.docker.internal)

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  external_labels:
    environment: production
    app: the-dozens

# ── Scrape configurations ────────────────────────────────────────────────────

scrape_configs:

  # ── Django API ─────────────────────────────────────────────────────────────
  # Scraped directly from the published container port, bypassing Traefik.
  # REMOTE_ADDR inside the container will be 172.28.0.1 (bridge gateway) —
  # that IP is included in PROMETHEUS_ALLOWED_HOSTS alongside 165.227.105.209.
  - job_name: django
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets:
          - localhost:9090
        labels:
          service: django-api

  # ── Traefik ────────────────────────────────────────────────────────────────
  # Traefik exposes its own metrics on the dedicated :8082 entry point
  # (--entrypoints.metrics / --metrics.prometheus.entryPoint=metrics).
  - job_name: traefik
    scrape_interval: 15s
    static_configs:
      - targets:
          - localhost:8082
        labels:
          service: traefik

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  # postgres-exporter runs as a container but connects to native PostgreSQL
  # via host.docker.internal. Its metrics port is published to localhost.
  - job_name: postgres
    scrape_interval: 30s
    static_configs:
      - targets:
          - localhost:9187
        labels:
          service: postgresql
          db: dozens

  # ── Dragonfly DB ───────────────────────────────────────────────────────────
  # dragonfly-exporter (oliver006/redis_exporter) connects to native Dragonfly
  # via host.docker.internal. Dragonfly is Redis-compatible — no changes needed.
  - job_name: dragonfly
    scrape_interval: 15s
    static_configs:
      - targets:
          - localhost:9121
        labels:
          service: dragonfly-db
