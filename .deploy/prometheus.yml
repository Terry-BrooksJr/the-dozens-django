# prometheus.yml — The Dozens API
#
# Prometheus runs natively on the host (165.227.105.209).
# All targets are reached via localhost ports that Docker publishes from
# each container — no container-internal DNS names are used here.
#
# Port map (host-side, localhost-only bindings):
#   9090  → api container          (Django /metrics, direct — bypasses Traefik)
#   8082  → traefik container      (Traefik built-in Prometheus metrics entrypoint)
#   9187  → postgres-exporter      (polls native PostgreSQL on host.docker.internal)
#   9999  → dragonfly native       (dragonfly --admin_port=9999, exposes dragonfly_* metrics)

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  external_labels:
    environment: production
    app: the-dozens

# ── Scrape configurations ────────────────────────────────────────────────────

scrape_configs:

  # ── Django API ─────────────────────────────────────────────────────────────
  # Scraped directly from the published container port, bypassing Traefik.
  # Auth is a bearer token (METRICS_SCRAPE_TOKEN in Doppler) — IP allowlists
  # were dropped because Docker NAT makes REMOTE_ADDR unreliable.
  - job_name: django
    scrape_interval: 15s
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/metrics_token
    static_configs:
      - targets:
          - localhost:9090
        labels:
          service: django-api

  # ── Traefik ────────────────────────────────────────────────────────────────
  # Traefik exposes its own metrics on the dedicated :8082 entry point
  # (--entrypoints.metrics / --metrics.prometheus.entryPoint=metrics).
  - job_name: traefik
    scrape_interval: 15s
    static_configs:
      - targets:
          - localhost:8082
        labels:
          service: traefik

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  # postgres-exporter runs as a container but connects to native PostgreSQL
  # via host.docker.internal. Its metrics port is published to localhost.
  - job_name: postgres
    scrape_interval: 30s
    static_configs:
      - targets:
          - localhost:9187
        labels:
          service: postgresql
          db: dozens
