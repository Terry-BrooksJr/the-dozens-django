components:
  responses:
    '401':
      description: Authentication credentials required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            authentication_required:
              summary: Missing or invalid authentication credentials
              description: This endpoint requires valid authentication. Provide a
                valid token in the Authorization header.
              value:
                detail: Yo momma so unknown, the server said 'New phone, who this?'
                code: authentication_failed
                status_code: 401
    '403':
      description: Insufficient permissions to access this resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            permission_denied:
              summary: User lacks required permissions
              description: The authenticated user does not have permission to perform
                this action on the requested resource.
              value:
                detail: Yo momma so restricted, even admin don't have clearance.
                code: permission_denied
                status_code: 403
            owner_only_access:
              summary: Only resource owner can modify
              description: This resource can only be modified by its owner. You can
                only modify insults that you created.
              value:
                detail: You can only modify resources that you own.
                code: permission_denied
                status_code: 403
    '404':
      description: The requested resource could not be found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            resource_not_found:
              summary: Requested resource does not exist
              description: The resource with the specified identifier was not found
                or may have been removed.
              value:
                detail: Yo momma so lost, she tried to route to this page with Apple
                  Maps.
                code: not_found
                status_code: 404
            insult_not_found:
              summary: Insult with specified ID does not exist
              description: The insult with the provided reference_id was not found
                in our database.
              value:
                detail: Insult not found.
                code: not_found
                status_code: 404
            category_not_found:
              summary: Category with specified key/name does not exist
              description: The category with the provided key or name was not found.
                Check available categories using the /api/categories endpoint.
              value:
                detail: Category not found.
                code: not_found
                status_code: 404
            no_results_found:
              summary: No resources match the specified filters
              description: No resources were found that match your search criteria.
                Try adjusting your filters or search parameters.
              value:
                detail: No results found matching the provided criteria.
                code: not_found
                status_code: 404
    '429':
      description: API rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            rate_limit_exceeded:
              summary: Too many requests in given time period
              description: You have exceeded the API rate limit. Please wait before
                making additional requests.
              value:
                detail: Request was throttled. Expected available in 60 seconds.
                code: throttled
                status_code: 429
    '500':
      description: Internal server error occurred
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            internal_server_error:
              summary: Unexpected server error
              description: An unexpected error occurred on the server. Please try
                again later or contact support if the problem persists.
              value:
                detail: Yo momma broke the server just by showing up.
                code: server_error
                status_code: 500
  schemas:
    Activation:
      type: object
      properties:
        uid:
          type: string
        token:
          type: string
      required:
      - token
      - uid
    ActivationRequest:
      type: object
      properties:
        uid:
          type: string
          minLength: 1
        token:
          type: string
          minLength: 1
      required:
      - token
      - uid
    CreateInsult:
      type: object
      description: |-
        Serializer for creating new insults.

        Handles insult creation with category validation,
        content requirements, and NSFW classification.
      properties:
        reference_id:
          type: string
          readOnly: true
        category:
          type: string
          description: Category key or name for the insult.
        content:
          type: string
          minLength: 60
        nsfw:
          type: boolean
          default: false
          description: Indicates if the insult is NSFW (Not Safe For Work).
        status:
          type: string
          readOnly: true
        added_by:
          type: string
          readOnly: true
        added_on:
          type: string
          readOnly: true
      required:
      - added_by
      - added_on
      - category
      - content
      - reference_id
      - status
    CreateInsultRequest:
      type: object
      description: |-
        Serializer for creating new insults.

        Handles insult creation with category validation,
        content requirements, and NSFW classification.
      properties:
        category:
          type: string
          minLength: 1
          description: Category key or name for the insult.
        content:
          type: string
          minLength: 60
        nsfw:
          type: boolean
          default: false
          description: Indicates if the insult is NSFW (Not Safe For Work).
      required:
      - category
      - content
    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
          description: Human-readable error message
        code:
          type: string
          description: Machine-readable error code
        status_code:
          type: integer
          description: HTTP status code
      required:
      - detail
      - code
      - status_code
    InsultReviewRequest:
      type: object
      description: |-
        Serializer for submitting insult reviews.

        Validates review submissions including insult reference,
        review type, and rationale.
      properties:
        insult_reference_id:
          type: string
          minLength: 1
          description: Reference ID of the insult being reviewed.
        anonymous:
          type: boolean
          description: Check if you want to remain anonymous
        review_type:
          enum:
          - RE
          - RC
          - RX
          type: string
          description: |-
            Type of review being submitted.

            * `RE` - Joke Reclassification
            * `RC` - Joke Recategorization
            * `RX` - Joke Removal
        rationale_for_review:
          type: string
          minLength: 70
          description: Detailed rationale for the review. (Minimum 70 characters.)
        reporter_first_name:
          type: string
          nullable: true
          maxLength: 80
        reporter_last_name:
          type: string
          nullable: true
          maxLength: 80
        post_review_contact_desired:
          type: boolean
        reporter_email:
          type: string
          format: email
          nullable: true
          maxLength: 254
      required:
      - insult_reference_id
      - rationale_for_review
      - review_type
    OptimizedInsult:
      type: object
      description: |-
        Performance-optimized insult serializer.

        Enhanced serializer for bulk operations with caching,
        prefetching, and optimized field selection.
      properties:
        content:
          type: string
        reference_id:
          type: string
          readOnly: true
          nullable: true
          description: Unique identifier for the insult, generated from the primary
            key.
        category:
          type: string
        nsfw:
          type: boolean
        status:
          enum:
          - A
          - X
          - P
          - R
          - F
          type: string
          description: |-
            * `A` - Active
            * `X` - Inactive/Removed
            * `P` - Pending - New
            * `R` - Rejected
            * `F` - Flagged for Review
          readOnly: true
        added:
          type: string
          readOnly: true
        by:
          type: string
          readOnly: true
      required:
      - added
      - by
      - category
      - content
      - nsfw
      - reference_id
      - status
    OptimizedInsultRequest:
      type: object
      description: |-
        Performance-optimized insult serializer.

        Enhanced serializer for bulk operations with caching,
        prefetching, and optimized field selection.
      properties:
        content:
