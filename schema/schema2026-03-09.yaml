openapi: 3.0.3
info:
  title: Yo' Momma - The Joke API
  version: 1.0.0
  contact:
    name: Terry A. Brooks, Jr.
    url: https://brooksjr.com
    email: terry@brooksjr.com
paths:
  /api/:
    post:
      operationId: report_joke
      description: Submit a report for a joke that may violate community guidelines.
        The report is validated and forwarded to the moderation team via a GitHub
        issue. Anonymous submissions are supported; non-anonymous submissions require
        a first and last name. If post-review contact is desired, a valid email address
        must be provided.
      summary: Report a joke for review
      tags:
      - Joke Reporting
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InsultReviewRequest'
            examples:
              SubmitAnonymousInsultReview:
                value:
                  insult_reference_id: BURN_1234AB
                  anonymous: true
                  review_type: FLAG_FOR_REVIEW
                  rationale_for_review: The insult targets a protected characteristic
                    and may violate community guidelines. Please review and consider
                    removing it from public listings based on the platform's content
                    standards.
                  post_review_contact_desired: false
                summary: Submit an anonymous review for an insult
                description: Example request payload for submitting an anonymous review
                  using a known insult reference ID. Since this review is anonymous,
                  no reporter name or email details are required.
              SubmitContactableInsultReview:
                value:
                  insult_reference_id: SNAP_9XZ21
                  anonymous: false
                  review_type: Joke Reclassification
                  rationale_for_review: This insult includes personally identifying
                    information and could lead to targeted harassment. I am requesting
                    that it be removed or restricted, in line with your moderation
                    and safety policies.
                  reporter_first_name: Jordan
                  reporter_last_name: Brooks
                  reporter_email: jordan.brooks@example.com
                  post_review_contact_desired: true
                summary: Submit a non-anonymous review with contact details
                description: Example request payload for a reviewer who is willing
                  to be contacted about their report. When 'anonymous' is false, first
                  and last name are required. If 'post_review_contact_desired' is
                  true, an email address must also be supplied.
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/InsultReviewRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/InsultReviewRequest'
        required: true
      responses:
        '201':
          description: Report submitted successfully
        '400':
          description: Invalid report payload
        '422':
          description: Report could not be processed
        '500':
          description: Internal server error occurred
        '503':
          description: Service temporarily unavailable
  /api/categories/:
    get:
      operationId: list_categories
      description: |2-
          # Categories & Themes

        API endpoint for listing insult categories organized by theme.

        - Returns all public insult categories, grouped under their themes
        - Includes metadata such as insult counts and descriptions

        ## Endpoint

        - `GET /api/categories`

        ## Features

        - No authentication required
        - Cached responses for performance
        - Case‑insensitive category matching support
      summary: List all available insult categories
      tags:
      - Insult Categories
      responses:
        '200':
          description: List of available categories
        '404':
          description: The requested category could not be found
        '429':
          description: API rate limit exceeded
        '500':
          description: Internal server error occurred
  /api/health/:
    get:
      operationId: health_check
      description: Returns the aggregated health status of the service, including
        database connectivity, GraphQL schema availability, and LaunchDarkly client
        state.
      summary: Service health heartbeat
      tags:
      - Health
      responses:
        '200':
          description: All checks healthy
        '503':
          description: One or more checks degraded
  /api/insults/{reference_id}/:
    get:
      operationId: retrieve_insult
      description: Retrieve a specific insult by reference_id.
      summary: Retrieve a specific insult by ID.
      parameters:
      - in: path
        name: reference_id
        schema:
          type: string
        description: A unique integer value identifying this insult
        required: true
      tags:
      - Insults
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizedInsult'
              examples:
                MyInsultsListExample:
                  value:
                  - reference_id: GIGGLE_Nzk1
                    category: One-Off/Unique
                    content: Yo momma is so bald... you can see what''s on her mind.
                    status: Active
                    reports_count: 0
                  - reference_id: CACKLE_Xy12
                    category: Stupid
                    content: Yo momma so stupid, she went to the dentist to get Bluetooth.
                    status: Pending
                    reports_count: 2
                  summary: List of User's Insults
                  description: Shows a simplified list of insults created by the user
                SuccessResponse:
                  value:
                    reference_id: 1
                    content: Yo momma is so fat... she rolled over 4 quarters and
                      made a dollar!'
                    category: Fat
                    status: Active
                    nsfw: false
                    added_by: Mike R.
                    added_on: 2 years ago
                  summary: Success Response
          description: ''
        '404':
          description: The requested insult could not be found
        '500':
          description: Internal server error occurred
        '503':
          description: Service temporarily unavailable
    put:
      operationId: update_insult
      description: |-
        # Insult Details

        API endpoint for CRUD operations on a single insult.

        - All users can read insults
        - Only the owner can update or delete their insult

        ## Endpoints

        - `GET /api/insult/<reference_id>`: Retrieve insult
        - `PUT /api/insult/<reference_id>`: Update insult *(owner only)*
        - `PATCH /api/insult/<reference_id>`: Partially update insult *(owner only)*
        - `DELETE /api/insult/<reference_id>`: Delete insult *(owner only)*

        ## Authentication

        - Token authentication required for **PUT**, **PATCH**, and **DELETE**
        - Optional for **GET**
      summary: Update an existing insult. Only the owner can perform this action.
      parameters:
      - in: path
        name: reference_id
        schema:
          type: string
        description: A unique integer value identifying this insult
        required: true
      tags:
      - Insults
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OptimizedInsultRequest'
            examples:
              CreateOrModifyAnInsultExample:
                value:
                  category: Poor
                  content: Your code is like a maze - confusing and full of dead ends
                  nsfw: false
                summary: Create New Insult
                description: Example request for creating a new insult
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OptimizedInsultRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OptimizedInsultRequest'
        required: true
      security:
      - TokenAuth: []
      responses:
        '204':
          description: Insult updated successfully
        '400':
          description: Invalid input data provided
        '401':
          description: Authentication credentials required
        '403':
          description: Resource access restricted to owner only
        '404':
          description: The requested insult could not be found
        '405':
          description: HTTP method not allowed for this endpoint
        '429':
          description: API rate limit exceeded
        '500':
          description: Internal server error occurred
    patch:
      operationId: partial_update_insult
      description: |-
        # Insult Details

        API endpoint for CRUD operations on a single insult.

        - All users can read insults
        - Only the owner can update or delete their insult

        ## Endpoints

        - `GET /api/insult/<reference_id>`: Retrieve insult
        - `PUT /api/insult/<reference_id>`: Update insult *(owner only)*
        - `PATCH /api/insult/<reference_id>`: Partially update insult *(owner only)*
        - `DELETE /api/insult/<reference_id>`: Delete insult *(owner only)*

        ## Authentication

        - Token authentication required for **PUT**, **PATCH**, and **DELETE**
        - Optional for **GET**
      summary: Partial Update to existing insult. Only the owner can perform this
        action.
      parameters:
      - in: path
        name: reference_id
        schema:
          type: string
        description: A unique integer value identifying this insult
        required: true
      tags:
      - Insults
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedOptimizedInsultRequest'
            examples:
              CreateOrModifyAnInsultExample:
                value:
                  category: Poor
                  content: Your code is like a maze - confusing and full of dead ends
                  nsfw: false
                summary: Create New Insult
                description: Example request for creating a new insult
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedOptimizedInsultRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedOptimizedInsultRequest'
      security:
      - TokenAuth: []
      responses:
        '204':
          description: Insult partially updated successfully
        '400':
          description: Invalid input data provided
        '401':
          description: Authentication credentials required
        '403':
          description: Resource access restricted to owner only
        '404':
          description: The requested insult could not be found
        '405':
          description: HTTP method not allowed for this endpoint
        '429':
          description: API rate limit exceeded
        '500':
          description: Internal server error occurred
    delete:
      operationId: delete_insult
      description: |-
        # Insult Details

        API endpoint for CRUD operations on a single insult.

        - All users can read insults
        - Only the owner can update or delete their insult

        ## Endpoints

        - `GET /api/insult/<reference_id>`: Retrieve insult
        - `PUT /api/insult/<reference_id>`: Update insult *(owner only)*
        - `PATCH /api/insult/<reference_id>`: Partially update insult *(owner only)*
        - `DELETE /api/insult/<reference_id>`: Delete insult *(owner only)*

        ## Authentication

        - Token authentication required for **PUT**, **PATCH**, and **DELETE**
        - Optional for **GET**
      summary: Delete an existing insult. Only the owner can perform this action.
      parameters:
      - in: path
        name: reference_id
        schema:
          type: string
        description: A unique integer value identifying this insult
        required: true
      tags:
      - Insults
      security:
      - TokenAuth: []
      responses:
        '204':
          description: Insult deleted successfully
        '401':
          description: Authentication credentials required
        '403':
          description: Resource access restricted to owner only
        '404':
          description: The requested insult could not be found
        '405':
          description: HTTP method not allowed for this endpoint
        '429':
          description: API rate limit exceeded
        '500':
          description: Internal server error occurred
  /api/insults/category/{category_name}/:
    get:
      operationId: list_insults_by_category
      description: Retrieve paginated insults filtered by category. Authenticated
        users see their own insults plus all active insults; unauthenticated users
        see only active insults. Supports both category keys (e.g., 'P') and names
        (e.g., 'Poor').
      summary: List insults by category
      parameters:
      - in: path
        name: category_name
        schema:
          type: string
        required: true
      - in: query
        name: nsfw
        schema:
          type: boolean
        description: Filter explicit content. `true` returns only NSFW insults; `false`
          returns only SFW. If omitted, both are returned.
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Insults
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOptimizedInsultList'
              examples:
                MyInsultsListExample:
                  value:
                    count: 123
                    next: http://api.example.org/accounts/?page=4
                    previous: http://api.example.org/accounts/?page=2
                    results:
                    - - reference_id: GIGGLE_Nzk1
                        category: One-Off/Unique
                        content: Yo momma is so bald... you can see what''s on her
                          mind.
                        status: Active
                        reports_count: 0
                      - reference_id: CACKLE_Xy12
                        category: Stupid
                        content: Yo momma so stupid, she went to the dentist to get
                          Bluetooth.
                        status: Pending
                        reports_count: 2
                  summary: List of User's Insults
                  description: Shows a simplified list of insults created by the user
                SuccessResponse-Unfiltered(NSFW)AndUncategorized(Category):
                  value:
                    count: 123
                    next: http://api.example.org/accounts/?page=4
                    previous: http://api.example.org/accounts/?page=2
                    results:
                    - count: 133
                      results:
                      - reference_id: SNICKER_NDc4
                        content: Yo momma is so ugly... when they took her to the
                          beautician it took 12 hours for a quote!
                        category: Ugly
                        nsfw: false
                        added_by: John D.
                        added_on: 2 days ago
                      - reference_id: CACKLE_NDQ5
                        content: Yo momma is so fat... when she dives into the ocean,
                          there is a tsunami-warning!'
                        category: Fat
                        nsfw: false
                        added_by: Linda p.
                        added_on: 12 days ago
                      - reference_id: CHUCKLE_NDUz
                        content: Yo momma is so old her driver's license is written
                          with Roman numerals.
                        category: Old
                        nsfw: false
                        added_by: John D.
                        added_on: 4 Weeks Ago
                  summary: Success Response - Unfiltered (NSFW) and Uncategorized
                    (Category)
                  description: Example 200 response payload showing a list of insults
                    without NSFW filtering applied and without any category restrictions.
                    This represents the default unfiltered response.
                SuccessResponse-Categorized(Category)&Filtered(NSFW):
                  value:
                    count: 123
                    next: http://api.example.org/accounts/?page=4
                    previous: http://api.example.org/accounts/?page=2
                    results:
                    - count: 1
                      results:
                      - reference_id: CACKLE_NDY2
                        content: Yo momma is so poor... she accepts food stamps for
                          sex!
                        category: Poor
                        nsfw: true
                        added_by: John D.
                        added_on: 2 days ago
                  summary: Success Response - categorized (Category) & filtered(NSFW)
                  description: Example 200 response payload filtered to show only
                    NSFW insults in the 'Poor' category. Demonstrates combined filtering
                    via `category=P` and `nsfw=true`.
          description: Successfully retrieved paginated list of category-filtered
            insults
        '404':
          description: No resources found matching the provided criteria
        '429':
          description: API rate limit exceeded
        '500':
          description: Internal server error occurred
  /api/insults/new:
    post:
      operationId: create-insult
      description: |2-
          # Create New Insult (Must Be Registered User)

          Creates new insults owned by authenticated users. New insults
          default to 'Pending' status pending approval.

         ## Endpoints:
              POST /api/insults/new

         ## Authentication:
              Token authentication required

        ##  Request Body:
              content (str): Insult content (minimum 60 characters, UTF-8)
              nsfw (bool): Explicit content flag
              category (str): Category key or name
      summary: Create New Insult
      tags:
      - Insults
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInsultRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CreateInsultRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateInsultRequest'
        required: true
      security:
      - TokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateInsult'
              examples:
                SuccessfulCreation:
                  value:
                    reference_id: GIGGLE_ABC123
                    category: Poor
                    content: Your code is so poor, it makes welfare look like a luxury
                      lifestyle.
                    nsfw: false
                    status: Pending
                    added_by: DevJoker
                    added_on: 2 minutes ago
                  summary: New insult created successfully
                  description: Example response when a new insult is successfully
                    created
          description: Insult created successfully
        '400':
          description: Invalid input data provided
        '401':
          description: Authentication credentials required
        '403':
          description: Insufficient permissions to access this resource
        '500':
          description: Internal server error occurred
        '503':
          description: Service temporarily unavailable
  /api/insults/random/:
    get:
      operationId: get_random_insult
      description: Returns a single random insult from the active collection. Supports
        optional filtering by NSFW status and category for more targeted results.
      summary: Get a random insult
      parameters:
      - in: query
        name: category
        schema:
          type: string
        description: 'Filter insult to a category such as fat, poor, etc. '
      - in: query
        name: nsfw
        schema:
          type: boolean
        description: Filter explicit content. `true` returns only NSFW insults; `false`
          returns only SFW. If omitted, both are returned.
      tags:
      - Insults
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizedInsult'
              examples:
                MyInsultsListExample:
                  value:
                  - reference_id: GIGGLE_Nzk1
                    category: One-Off/Unique
                    content: Yo momma is so bald... you can see what''s on her mind.
                    status: Active
                    reports_count: 0
                  - reference_id: CACKLE_Xy12
                    category: Stupid
                    content: Yo momma so stupid, she went to the dentist to get Bluetooth.
                    status: Pending
                    reports_count: 2
                  summary: List of User's Insults
                  description: Shows a simplified list of insults created by the user
          description: Random insult retrieved successfully
        '404':
          description: No resources found matching the provided criteria
        '500':
          description: Internal server error occurred
        '503':
          description: Service temporarily unavailable
